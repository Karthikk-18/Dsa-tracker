<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Tracker — 300 Problems</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f7c66a;
    --easy: #4ade80;
    --medium: #fb923c;
    --hard: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --solved-bg: #1a2a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* WELCOME SCREEN */
  #welcome-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 32px;
  }

  .welcome-logo {
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    animation: fadeUp 0.6s ease both;
  }

  .welcome-title {
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 800;
    text-align: center;
    line-height: 1.1;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .welcome-title span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome-subtitle {
    color: var(--muted);
    font-size: 16px;
    text-align: center;
    max-width: 400px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .name-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 380px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .name-input-wrap {
    position: relative;
  }

  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .start-btn {
    background: linear-gradient(135deg, var(--accent), #9b8af0);
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    letter-spacing: 1px;
  }

  .start-btn:hover { transform: translateY(-2px); opacity: 0.9; }

  /* MAIN APP */
  #app { display: none; }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .header-title {
    font-size: 18px;
    font-weight: 800;
  }

  .header-user {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
  }

  .user-avatar {
    width: 26px;
    height: 26px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: white;
  }

  /* OVERALL PROGRESS BANNER */
  .progress-banner {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 32px;
    overflow-x: auto;
  }

  .prog-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: fit-content;
  }

  .prog-stat-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-family: 'Space Mono', monospace; }
  .prog-stat-value { font-size: 28px; font-weight: 800; }
  .prog-stat-value.accent { color: var(--accent); }
  .prog-stat-value.easy { color: var(--easy); }
  .prog-stat-value.medium { color: var(--medium); }
  .prog-stat-value.hard { color: var(--hard); }

  .prog-bar-section {
    flex: 1;
    min-width: 200px;
  }

  .prog-bar-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

  .prog-bar-outer {
    height: 8px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .prog-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  .divider { width: 1px; height: 50px; background: var(--border); min-width: 1px; }

  /* MAIN LAYOUT */
  .main-layout {
    display: flex;
    height: calc(100vh - 135px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
  }

  .sidebar-section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 10px;
    font-family: 'Space Mono', monospace;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active { background: var(--surface2); }
  .sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .topic-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .sidebar-topic-name {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
  }

  .sidebar-mini-progress {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    min-width: 44px;
  }

  .sidebar-count {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  .mini-bar {
    width: 40px;
    height: 3px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* CONTENT AREA */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }

  .content-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 20px;
    flex-wrap: wrap;
  }

  .content-title-wrap {}

  .content-topic-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-bottom: 6px;
  }

  .content-title {
    font-size: 32px;
    font-weight: 800;
  }

  .content-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }

  .topic-stats {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .diff-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
  }

  .diff-badge.easy { background: rgba(74,222,128,0.1); color: var(--easy); border: 1px solid rgba(74,222,128,0.3); }
  .diff-badge.medium { background: rgba(251,146,60,0.1); color: var(--medium); border: 1px solid rgba(251,146,60,0.3); }
  .diff-badge.hard { background: rgba(248,113,113,0.1); color: var(--hard); border: 1px solid rgba(248,113,113,0.3); }

  /* TOPIC PROGRESS BAR */
  .topic-progress-strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .topic-prog-nums {
    font-size: 14px;
    color: var(--muted);
    min-width: fit-content;
    font-family: 'Space Mono', monospace;
  }

  .topic-prog-nums strong { color: var(--text); font-size: 20px; }

  .topic-prog-bar-outer {
    flex: 1;
    height: 10px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .topic-prog-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  .topic-prog-pct {
    font-size: 18px;
    font-weight: 800;
    min-width: 48px;
    text-align: right;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }

  /* PROBLEMS LIST */
  .problems-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .problem-row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .problem-row:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(2px);
  }

  .problem-row.solved {
    background: var(--solved-bg);
    border-color: rgba(74,222,128,0.2);
  }

  .problem-row.solved .problem-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .prob-num {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    min-width: 28px;
  }

  .prob-check {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 2;
  }

  .prob-check:hover { border-color: var(--easy); }
  .prob-check.checked { background: var(--easy); border-color: var(--easy); }
  .prob-check.checked::after { content: '✓'; font-size: 13px; color: #0a0a0f; font-weight: 800; }

  .problem-name {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    transition: color 0.2s;
  }

  .prob-difficulty {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    min-width: 58px;
    text-align: right;
  }

  .prob-difficulty.Easy { color: var(--easy); }
  .prob-difficulty.Medium { color: var(--medium); }
  .prob-difficulty.Hard { color: var(--hard); }

  .leetcode-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: rgba(255,161,22,0.08);
    border: 1px solid rgba(255,161,22,0.2);
    color: #ffa116;
    text-decoration: none;
    font-size: 14px;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .leetcode-link:hover { background: rgba(255,161,22,0.2); transform: scale(1.1); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.3s ease both; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Mobile */
  @media (max-width: 768px) {
    .main-layout { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: auto; overflow-x: auto; overflow-y: hidden; display: flex; flex-direction: row; padding: 12px; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar-section-label { display: none; }
    .sidebar-item { flex-direction: column; min-width: 80px; padding: 10px 12px; gap: 6px; border-radius: 10px; }
    .sidebar-topic-name { font-size: 10px; text-align: center; }
    .sidebar-mini-progress { display: none; }
    .content { padding: 20px; }
    .progress-banner { flex-wrap: wrap; gap: 16px; }
    .header { padding: 12px 20px; }
  }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="welcome-screen">
  <div class="welcome-logo">⚡ DSA Tracker</div>
  <h1 class="welcome-title">Master <span>300 Problems</span><br>One at a Time</h1>
  <p class="welcome-subtitle">Track your DSA journey across 10 topics. Click problems to open on LeetCode. Check them off as you solve them.</p>
  <div class="name-form">
    <input class="name-input" id="nameInput" type="text" placeholder="Enter your name to begin..." maxlength="30" autocomplete="off" />
    <button class="start-btn" onclick="startApp()">Start Tracking →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">⚡</div>
      <div class="header-title">DSA Tracker</div>
    </div>
    <div class="header-user">
      <div class="user-avatar" id="userAvatar">A</div>
      <span id="headerUserName">Coder</span>
    </div>
  </header>

  <div class="progress-banner">
    <div class="prog-stat">
      <div class="prog-stat-label">Total Solved</div>
      <div class="prog-stat-value accent" id="statTotal">0 / 300</div>
    </div>
    <div class="divider"></div>
    <div class="prog-stat">
      <div class="prog-stat-label">Easy</div>
      <div class="prog-stat-value easy" id="statEasy">0</div>
    </div>
    <div class="prog-stat">
      <div class="prog-stat-label">Medium</div>
      <div class="prog-stat-value medium" id="statMedium">0</div>
    </div>
    <div class="prog-stat">
      <div class="prog-stat-label">Hard</div>
      <div class="prog-stat-value hard" id="statHard">0</div>
    </div>
    <div class="divider"></div>
    <div class="prog-bar-section">
      <div class="prog-bar-label" id="progBarLabel">Overall Progress — 0%</div>
      <div class="prog-bar-outer">
        <div class="prog-bar-inner" id="overallBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="main-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
const DSA_DATA = {"Arrays & Strings": [{"name": "Two Sum", "difficulty": "Easy", "leetcode": "https://leetcode.com/problems/two-sum/"}, {"name": "Best Time to Buy and Sell Stock", "difficulty": "Easy", "leetcode": "https://leetcode.com/problems/best-time-to-buy-and-sell-stock/"}, {"name": "Contains Duplicate", "difficulty": "Easy", "leetcode": "https://leetcode.com/problems/contains-duplicate/"}, {"name": "Product of Array Except Self", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/product-of-array-except-self/"}, {"name": "Maximum Subarray", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/maximum-subarray/"}, {"name": "Maximum Product Subarray", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/maximum-product-subarray/"}, {"name": "Find Minimum in Rotated Sorted Array", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/find-minimum-in-rotated-sorted-array/"}, {"name": "Search in Rotated Sorted Array", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/search-in-rotated-sorted-array/"}, {"name": "3Sum", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/3sum/"}, {"name": "Container With Most Water", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/container-with-most-water/"}, {"name": "Rotate Array", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/rotate-array/"}, {"name": "Longest Common Prefix", "difficulty": "Easy", "leetcode": "https://leetcode.com/problems/longest-common-prefix/"}, {"name": "Valid Anagram", "difficulty": "Easy", "leetcode": "https://leetcode.com/problems/valid-anagram/"}, {"name": "Group Anagrams", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/group-anagrams/"}, {"name": "Longest Substring Without Repeating Characters", "difficulty": "Medium", "leetcode": "https://leetcode.com/problems/longest-substring-without-repeating-characters/"}, {"name": "Minimum Window Substring", "difficul };

const STORAGE_KEY = 'dsa_tracker_v2';
let state = { solved: {}, userName: '' };
let currentTopic = Object.keys(DSA_DATA)[0];

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getProblemKey(topic, idx) { return `${topic}::${idx}`; }

function isSolved(topic, idx) { return !!state.solved[getProblemKey(topic, idx)]; }

function toggleSolved(topic, idx) {
  const k = getProblemKey(topic, idx);
  state.solved[k] = !state.solved[k];
  saveState();
  updateAllStats();
  updateSidebarItem(topic);
  updateProblemRow(topic, idx);
}

function getTopicStats(topic) {
  const problems = DSA_DATA[topic];
  const solved = problems.filter((_, i) => isSolved(topic, i)).length;
  return { solved, total: problems.length };
}

function getAllStats() {
  let total = 0, solved = 0, easy = 0, medium = 0, hard = 0;
  for (const topic of Object.keys(DSA_DATA)) {
    DSA_DATA[topic].forEach((p, i) => {
      total++;
      if (isSolved(topic, i)) {
        solved++;
        if (p.difficulty === 'Easy') easy++;
        else if (p.difficulty === 'Medium') medium++;
        else hard++;
      }
    });
  }
  return { total, solved, easy, medium, hard };
}

function updateAllStats() {
  const s = getAllStats();
  document.getElementById('statTotal').textContent = `${s.solved} / ${s.total}`;
  document.getElementById('statEasy').textContent = s.easy;
  document.getElementById('statMedium').textContent = s.medium;
  document.getElementById('statHard').textContent = s.hard;
  const pct = Math.round((s.solved / s.total) * 100);
  document.getElementById('overallBar').style.width = pct + '%';
  document.getElementById('progBarLabel').textContent = `Overall Progress — ${pct}%`;
}

function updateSidebarItem(topic) {
  const el = document.getElementById('sidebar-mini-' + CSS.escape(topic));
  if (!el) return;
  const { solved, total } = getTopicStats(topic);
  el.querySelector('.sidebar-count').textContent = `${solved}/${total}`;
  el.querySelector('.mini-bar-fill').style.width = (solved / total * 100) + '%';
}

function updateProblemRow(topic, idx) {
  const row = document.getElementById(`prob-${idx}`);
  if (!row) return;
  const solved = isSolved(topic, idx);
  row.classList.toggle('solved', solved);
  const check = row.querySelector('.prob-check');
  check.classList.toggle('checked', solved);
  // Update topic progress bar
  const { solved: ts, total } = getTopicStats(topic);
  const tBar = document.getElementById('topicBar');
  const tPct = document.getElementById('topicPct');
  const tNums = document.getElementById('topicNums');
  if (tBar) { tBar.style.width = (ts / total * 100) + '%'; }
  if (tPct) { tPct.textContent = Math.round(ts / total * 100) + '%'; }
  if (tNums) { tNums.innerHTML = `<strong>${ts}</strong> / ${total} solved`; }
}

function startApp() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  state.userName = name;
  saveState();
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('headerUserName').textContent = name;
  document.getElementById('userAvatar').textContent = name[0].toUpperCase();
  renderSidebar();
  renderTopic(currentTopic);
  updateAllStats();
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `<div class="sidebar-section-label">Topics</div>`;
  Object.keys(DSA_DATA).forEach(topic => {
    const info = TOPIC_ICONS[topic] || { icon: '📌', color: '#7c6af7' };
    const { solved, total } = getTopicStats(topic);
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (topic === currentTopic ? ' active' : '');
    div.onclick = (e) => selectTopic(topic, e);
    div.innerHTML = `
      <div class="topic-icon" style="background:${info.color}22">${info.icon}</div>
      <div class="sidebar-topic-name">${topic}</div>
      <div class="sidebar-mini-progress" id="sidebar-mini-${topic}">
        <span class="sidebar-count">${solved}/${total}</span>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${solved/total*100}%"></div></div>
      </div>
    `;
    sidebar.appendChild(div);
  });
}

function selectTopic(topic, e) {
  currentTopic = topic;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (e) e.currentTarget.classList.add('active');
  renderTopic(topic);
}

        <div class="topic-prog-bar-inner" id="topicBar" style="width:${pct}%"></div>
      </div>
      <div class="topic-prog-pct" id="topicPct">${pct}%</div>
    </div>
    <div class="problems-grid fade-in" id="problemsGrid">
      ${problems.map((p, i) => `
        <div class="problem-row${isSolved(topic, i) ? ' solved' : ''}" id="prob-${i}">
          <span class="prob-num">${String(i+1).padStart(2,'0')}</span>
          <div class="prob-check${isSolved(topic, i) ? ' checked' : ''}" onclick="event.stopPropagation(); toggleSolved('${topic.replace(/'/g,"\\'")}', ${i})"></div>
          <a class="problem-name" href="${p.leetcode}" target="_blank" onclick="event.stopPropagation()" style="text-decoration:none;color:inherit">${p.name}</a>
          <span class="prob-difficulty ${p.difficulty}">${p.difficulty}</span>
          <a class="leetcode-link" href="${p.leetcode}" target="_blank" onclick="event.stopPropagation()" title="Open on LeetCode">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13.483 0a1.374 1.374 0 0 0-.961.438L7.116 6.226l-3.854 4.126a5.266 5.266 0 0 0-1.209 2.104 5.35 5.35 0 0 0-.125.513 5.527 5.527 0 0 0 .062 2.362 5.83 5.83 0 0 0 .349 1.017 5.938 5.938 0 0 0 1.271 1.818l4.277 4.193.039.038c2.248 2.165 5.852 2.133 8.063-.074l2.396-2.392c.54-.54.54-1.414.003-1.955a1.378 1.378 0 0 0-1.951-.003l-2.396 2.392a3.021 3.021 0 0 1-4.205.038l-.02-.019-4.276-4.193c-.652-.64-.972-1.469-.948-2.263a2.68 2.68 0 0 1 .066-.523 2.545 2.545 0 0 1 .619-1.164L9.13 8.114c1.058-1.134 3.204-1.27 4.43-.278l3.501 2.831c.593.48 1.461.387 1.94-.207a1.384 1.384 0 0 0-.207-1.943l-3.5-2.831c-.8-.647-1.766-1.045-2.774-1.202l2.015-2.158A1.384 1.384 0 0 0 13.483 0zm-2.866 12.815a1.38 1.38 0 0 0-1.38 1.382 1.38 1.38 0 0 0 1.38 1.382H20.79a1.38 1.38 0 0 0 1.38-1.382 1.38 1.38 0 0 0-1.38-1.382z"/></svg>
          </a>
        </div>
      `).join('')}
    </div>
  `;

  // Add click on row to open leetcode
  document.querySelectorAll('.problem-row').forEach((row, i) => {
    row.addEventListener('click', () => {
      window.open(problems[i].leetcode, '_blank');
    });
  });
}

// Handle Enter key
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startApp();
});

// Init
loadState();
if (state.userName) {
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('headerUserName').textContent = state.userName;
  document.getElementById('userAvatar').textContent = state.userName[0].toUpperCase();
  renderSidebar();
  renderTopic(currentTopic);
  updateAllStats();
}
</script>
</body>
</html>
